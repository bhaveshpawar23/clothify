<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clothify | Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">
                <img src="assets/logo.png" alt="Clothify Logo">
            </a>
            <h2>Create Account</h2>
            <p>Join us and start shopping</p>
        </div>
        <form id="registerForm" class="auth-form">
            <div class="input-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Create a password" required>
            </div>
            <div id="registerError" class="auth-error" style="display:none;"></div>
            <button type="submit" id="registerBtn" class="auth-btn">Create Account</button>
            <div class="auth-divider" style="display: flex; justify-content: center; align-items: center; padding: 0px 0px 10px 0px;">
                <span>OR</span>
            </div>
            <button type="button" id="googleRegisterBtn" class="auth-google-btn">
                Sign Up with Google
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-analytics.js"></script>
    <script src="firebase-config/firebaseConfig.js"></script>
    <script src="js/app.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
