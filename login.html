<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clothify | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">
                <img src="assets/logo.png" alt="Clothify Logo">
            </a>
            <h2>Welcome Back!</h2>
            <p>Login to continue shopping</p>
        </div>
        <form id="loginForm" class="auth-form">
            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <div id="loginError" class="auth-error" style="display:none;"></div>
            <button type="submit" id="loginBtn" class="auth-btn">Login</button>
            <div class="auth-divider">
                <span>OR</span>
            </div>
            <button type="button" id="googleLoginBtn" class="auth-google-btn">
                Continue with Google
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Create one</a></p>
            <p><a href="forgot.html">Forgot Password?</a></p>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-analytics.js"></script>
    <script src="firebase-config/firebaseConfig.js"></script>
    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
